services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - penthouse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      ALTCHA_HMAC_KEY: ${ALTCHA_HMAC_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      LEGACY_APK_DOWNLOAD_PATH: ${LEGACY_APK_DOWNLOAD_PATH:-/downloads/legacy/the-penthouse.apk}
      LEGACY_APK_STATUS: ${LEGACY_APK_STATUS:-unavailable}
      UPLOAD_MAX_MB: ${UPLOAD_MAX_MB:-25}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/services/api/uploads}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-${UPLOAD_MAX_MB:-25}}
      UPLOAD_RATE_LIMIT_MAX_FILES: ${UPLOAD_RATE_LIMIT_MAX_FILES:-3}
      UPLOAD_RATE_LIMIT_WINDOW_MINUTES: ${UPLOAD_RATE_LIMIT_WINDOW_MINUTES:-15}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-}
      ALPHA_BOOTSTRAP_INVITE_CODE: ${ALPHA_BOOTSTRAP_INVITE_CODE:-}
      ALPHA_BOOTSTRAP_INVITE_LABEL: ${ALPHA_BOOTSTRAP_INVITE_LABEL:-Production alpha invite}
      ALPHA_BOOTSTRAP_INVITE_MAX_USES: ${ALPHA_BOOTSTRAP_INVITE_MAX_USES:-25}
      ALPHA_BOOTSTRAP_INVITE_EXPIRES_AT: ${ALPHA_BOOTSTRAP_INVITE_EXPIRES_AT:-}
      ALPHA_REVOKE_DEFAULT_INVITE: ${ALPHA_REVOKE_DEFAULT_INVITE:-true}
      TEST_ACCOUNT_NOTICE_VERSION: ${TEST_ACCOUNT_NOTICE_VERSION:-alpha-v1}
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
      KLIPY_API_KEY: ${KLIPY_API_KEY:-}
      FCM_SERVICE_ACCOUNT_PATH: ${FCM_SERVICE_ACCOUNT_PATH:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      BACKUP_STATUS_PATH: ${BACKUP_STATUS_PATH:-}
      OPS_BUILD_ID: ${OPS_BUILD_ID:-}
      OPS_DEPLOYED_AT: ${OPS_DEPLOYED_AT:-}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - penthouse_uploads:/app/services/api/uploads
      - ${FCM_SERVICE_ACCOUNT_FILE:-/dev/null}:/run/secrets/firebase-admin.json:ro

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      ROOT_SITE_ADDRESS: ${ROOT_SITE_ADDRESS}
      API_SITE_ADDRESS: ${API_SITE_ADDRESS}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile.production:/etc/caddy/Caddyfile:ro
      - ./site/public:/srv/site:ro
      - ${PUBLIC_DOWNLOADS_PATH}:/srv/downloads:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:2019/config/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  penthouse_pgdata:
  penthouse_uploads:
  caddy_data:
  caddy_config:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: penthouse
      POSTGRES_PASSWORD: penthouse
      POSTGRES_DB: penthouse
    ports:
      - "5432:5432"
    volumes:
      - penthouse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penthouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: penthouse
      POSTGRES_PASSWORD: penthouse
      POSTGRES_DB: penthouse_test
    ports:
      - "5433:5432"
    volumes:
      - penthouse_pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penthouse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  penthouse_pgdata:
  penthouse_pgdata_test:

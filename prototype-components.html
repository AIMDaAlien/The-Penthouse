<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Penthouse - Component System (Nocturne Palette)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gelasio:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Nocturne Base Palette */
    --bg-color: #12121C;
    --surface-color: #1A1A24;
    --surface-elevated: #242432;
    --border-solid: rgba(130, 130, 195, 0.15);
    
    /* Nocturne Accent Palette from Image */
    --primary: #7070DA;
    --primary-light: #C0C0F0; /* From light button in image */
    --primary-dark: #1A1A40;
    
    --secondary: #8282C3;
    --tertiary: #567DD4;
    
    /* Utility Colors */
    --danger: #FF2400; /* Scarlet red for delete button */
    --text-primary: #EAEAF2;
    --text-secondary: #8E8EAD;

    /* Typography */
    --font-display: 'Gelasio', serif;
    --font-body: 'Ubuntu', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;

    /* New Pill Roundedness */
    --radius-pill: 9999px;
    --radius-card: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    font-family: var(--font-body);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: 3rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4rem;
  }

  h1, h2 { font-family: var(--font-display); font-weight: 500; letter-spacing: 0.02em; }
  .section-title { font-size: 1.5rem; color: var(--text-secondary); margin-bottom: 2rem; border-bottom: 1px solid var(--border-solid); padding-bottom: 0.5rem; width: 100%; max-width: 900px; }
  .grid-container { width: 100%; max-width: 900px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
  
  .card {
    background: var(--surface-color);
    border: 1px solid var(--border-solid);
    border-radius: var(--radius-card);
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .card-label { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary); align-self: flex-start; }

  /* ========================================== */
  /* BUTTONS                                    */
  /* ========================================== */
  
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 28px;
    font-family: var(--font-body); font-size: 0.95rem; font-weight: 500;
    border-radius: var(--radius-pill); /* The core constraint from image */
    border: none; cursor: pointer; transition: all 0.2s ease;
  }

  .btn-primary { background: var(--primary-light); color: var(--primary-dark); }
  .btn-primary:hover { background: var(--primary); color: white; }

  .btn-secondary { background: var(--surface-elevated); color: var(--text-primary); }
  .btn-secondary:hover { background: #323246; }

  .btn-inverted { background: var(--text-primary); color: var(--bg-color); }
  .btn-inverted:hover { background: white; }

  .btn-outlined { background: transparent; border: 1px solid var(--text-secondary); color: var(--text-primary); }
  .btn-outlined:hover { border-color: var(--text-primary); background: rgba(255,255,255,0.05); }

  /* Floating Action Buttons (Circle) */
  .fab {
    width: 48px; height: 48px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: none; cursor: pointer; transition: all 0.2s ease;
  }
  .fab-primary { background: var(--primary); color: white; }
  .fab-secondary { background: var(--primary-light); color: var(--primary-dark); }
  .fab-danger { background: var(--danger); color: white; }
  .fab-tertiary { background: var(--tertiary); color: white; }


  /* ========================================== */
  /* INPUTS (Pill-shaped Search)                */
  /* ========================================== */
  
  .input-wrapper {
    position: relative; width: 100%;
  }
  .input-pill {
    width: 100%;
    background: var(--surface-elevated);
    border: 1px solid transparent;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 1rem;
    padding: 14px 20px 14px 48px;
    border-radius: var(--radius-pill); /* Match button roundness */
    outline: none; transition: border-color 0.2s, background 0.2s;
  }
  .input-pill:focus {
    background: var(--bg-color);
    border-color: var(--primary);
  }
  .input-pill::placeholder { color: var(--text-secondary); }
  
  .input-icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    width: 20px; height: 20px; color: var(--text-secondary);
    pointer-events: none;
  }

  /* ========================================== */
  /* ELEGANT CUSTOM ICONS                       */
  /* Custom geometric shapes, 1.5px stroke      */
  /* ========================================== */
  
  .icon-row { display: flex; gap: 24px; align-items: center; justify-content: center; background: var(--surface-elevated); padding: 16px 32px; border-radius: var(--radius-pill); }
  .icon-elegant {
    width: 24px; height: 24px; fill: none; stroke: currentColor;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    transition: color 0.2s ease; cursor: pointer;
  }
  .icon-elegant:hover { color: var(--primary); }

  .icon-active-bg { background: var(--primary-light); color: var(--primary-dark); padding: 8px; border-radius: 50%; width: 40px; height: 40px; }

</style>
</head>
<body>

  <h1 style="text-align: center; margin-bottom: -2rem;">The Penthouse Base Components</h1>
  <p style="font-family: var(--font-mono); color: var(--text-secondary); font-size: 0.85rem; text-align: center;">Nocturne Palette • Pill Radii • Custom SVG Iconography</p>

  <!-- BUTTONS -->
  <div style="width: 100%; max-width: 900px;">
    <h2 class="section-title">Actions & Buttons</h2>
    <div class="grid-container">
      
      <div class="card">
        <span class="card-label">Primary / Secondary</span>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
          <button class="btn btn-primary">Primary</button>
          <button class="btn btn-secondary">Secondary</button>
        </div>
      </div>

      <div class="card">
        <span class="card-label">Inverted / Outlined</span>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
          <button class="btn btn-inverted">Inverted</button>
          <button class="btn btn-outlined">Outlined</button>
        </div>
      </div>

      <div class="card">
        <span class="card-label">Circular Actions (FABs)</span>
        <div style="display: flex; gap: 1rem; justify-content: center; width: 100%;">
          <button class="fab fab-primary">
            <!-- Edit Icon -->
            <svg class="icon-elegant" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
          <button class="fab fab-secondary">
            <!-- Layout/Dashboard Icon -->
            <svg class="icon-elegant" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          </button>
          <button class="fab fab-tertiary">
            <!-- Tag Icon -->
            <svg class="icon-elegant" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          </button>
          <button class="fab fab-danger">
            <!-- Delete/Trash Icon -->
            <svg class="icon-elegant" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- INPUTS -->
  <div style="width: 100%; max-width: 900px;">
    <h2 class="section-title">Inputs & Forms</h2>
    <div class="grid-container">
      
      <div class="card" style="grid-column: span 2;">
        <span class="card-label">Pill-shaped Search</span>
        <div class="input-wrapper">
          <svg class="icon-elegant input-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="input-pill" placeholder="Search the penthouse...">
        </div>
      </div>

    </div>
  </div>

  <!-- ICONS -->
  <div style="width: 100%; max-width: 900px;">
    <h2 class="section-title">Custom SVG Iconography (Elegant, 1.5px stroke)</h2>
    <div class="grid-container">
      
      <div class="card" style="grid-column: span 2;">
        <span class="card-label">Navigation Icons</span>
        <div class="icon-row">
          <!-- Home -->
          <svg class="icon-elegant icon-active-bg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <!-- Search -->
          <svg class="icon-elegant" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <!-- User/Profile -->
          <svg class="icon-elegant" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <!-- Chat/Message -->
          <svg class="icon-elegant" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          <!-- Settings -->
          <svg class="icon-elegant" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </div>
      </div>

    </div>
  </div>

</body>
</html>

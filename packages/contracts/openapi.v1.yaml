openapi: 3.1.0
info:
  title: The Penthouse API
  version: 1.0.0-alpha
  description: Private social platform API. All protected endpoints require a Bearer access token.
servers:
  - url: http://localhost:3000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          oneOf:
            - type: string
              description: Human-readable error message
            - type: object
              description: Zod field-level validation error (fieldErrors + formErrors)

    RegisterRequest:
      type: object
      required: [username, password, inviteCode, acceptTestNotice, testNoticeVersion]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9._-]+$'
          description: Trimmed and lowercased by the server
        password:
          type: string
          minLength: 10
          maxLength: 128
          description: Must not start or end with spaces
        inviteCode:
          type: string
          minLength: 6
          maxLength: 64
          description: Trimmed and uppercased by the server
        acceptTestNotice:
          type: boolean
          enum: [true]
          description: Must be true to acknowledge test account terms
        testNoticeVersion:
          type: string
          minLength: 1
          maxLength: 64
          description: Version of the notice acknowledged by the client

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9._-]+$'
          description: Trimmed and lowercased by the server
        password:
          type: string
          minLength: 10
          maxLength: 128

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 20
          description: Opaque refresh token (96-char hex from server)

    PasswordResetRequest:
      type: object
      required: [username, recoveryCode, newPassword]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9._-]+$'
          description: Trimmed and lowercased by the server
        recoveryCode:
          type: string
          minLength: 16
          maxLength: 24
          description: Signup recovery code. Hyphens and spaces are ignored.
        newPassword:
          type: string
          minLength: 10
          maxLength: 128
          description: Must not start or end with spaces

    UserRole:
      type: string
      enum: [admin, member]

    UserStatus:
      type: string
      enum: [active, removed, banned]

    AuthUser:
      type: object
      required: [id, username, displayName, avatarUrl, role, mustChangePassword, mustAcceptTestNotice, requiredTestNoticeVersion, acceptedTestNoticeVersion]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        mustChangePassword:
          type: boolean
        mustAcceptTestNotice:
          type: boolean
        requiredTestNoticeVersion:
          type: string
        acceptedTestNoticeVersion:
          type: string
          nullable: true

    AuthResponse:
      type: object
      required: [user, accessToken, refreshToken]
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        accessToken:
          type: string
          description: Short-lived JWT (default 15m)
        refreshToken:
          type: string
          description: Long-lived opaque token for rotation (default 7d)
        recoveryCode:
          type: string
          description: One-time recovery code display for signup, reset, or backfilled older accounts

    MeResponse:
      allOf:
        - $ref: '#/components/schemas/AuthUser'
        - type: object
          required: [bio, avatarMediaId]
          properties:
            bio:
              type: string
              nullable: true
            avatarMediaId:
              type: string
              format: uuid
              nullable: true

    UpdateProfileRequest:
      type: object
      minProperties: 1
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 40
        bio:
          type: string
          maxLength: 160
          nullable: true
        avatarUploadId:
          type: string
          format: uuid
          nullable: true

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 10
          maxLength: 128
        newPassword:
          type: string
          minLength: 10
          maxLength: 128
          description: Must not start or end with spaces

    RotateRecoveryCodeResponse:
      type: object
      required: [recoveryCode]
      properties:
        recoveryCode:
          type: string

    SessionSummary:
      type: object
      required: [id, createdAt, lastUsedAt, deviceLabel, appContext, hasPushToken, current]
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
        deviceLabel:
          type: string
        appContext:
          type: string
          nullable: true
        hasPushToken:
          type: boolean
        current:
          type: boolean

    RevokeOtherSessionsResponse:
      type: object
      required: [revokedCount]
      properties:
        revokedCount:
          type: integer
          minimum: 0

    TestNoticeAckRequest:
      type: object
      required: [version]
      properties:
        version:
          type: string
          minLength: 1
          maxLength: 64

    TestNoticeAckResponse:
      type: object
      required: [user, acceptedAt]
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        acceptedAt:
          type: string
          format: date-time

    RegisterDeviceTokenRequest:
      type: object
      required: [platform, token]
      properties:
        platform:
          type: string
          enum: [android, ios]
        token:
          type: string
          minLength: 1
          maxLength: 4096
        previousToken:
          type: string
          minLength: 1
          maxLength: 4096

    RegisterDeviceTokenResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid

    UnregisterDeviceTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 1
          maxLength: 4096

    DeviceNotificationSettings:
      type: object
      required: [token, notificationsEnabled, previewsEnabled, quietHoursEnabled, quietHoursStartMinute, quietHoursEndMinute, timezone]
      properties:
        token:
          type: string
          minLength: 1
          maxLength: 4096
        notificationsEnabled:
          type: boolean
        previewsEnabled:
          type: boolean
        quietHoursEnabled:
          type: boolean
        quietHoursStartMinute:
          type: integer
          nullable: true
          minimum: 0
          maximum: 1439
        quietHoursEndMinute:
          type: integer
          nullable: true
          minimum: 0
          maximum: 1439
        timezone:
          type: string
          nullable: true
          minLength: 1
          maxLength: 128

    ChatSummary:
      type: object
      required: [id, type, name, updatedAt, unreadCount]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [dm, channel]
        name:
          type: string
        updatedAt:
          type: string
          format: date-time
        unreadCount:
          type: integer
          minimum: 0
        counterpartMemberId:
          type: string
          format: uuid
        counterpartAvatarUrl:
          type: string
          nullable: true
        notificationsMuted:
          type: boolean

    CreateDirectChatRequest:
      type: object
      required: [memberId]
      properties:
        memberId:
          type: string
          format: uuid

    ChatPreferencesRequest:
      type: object
      required: [notificationsMuted]
      properties:
        notificationsMuted:
          type: boolean

    ChatPreferencesResponse:
      type: object
      required: [chatId, notificationsMuted]
      properties:
        chatId:
          type: string
          format: uuid
        notificationsMuted:
          type: boolean

    Message:
      type: object
      required: [id, chatId, senderId, content, type, createdAt]
      properties:
        id:
          type: string
          format: uuid
        chatId:
          type: string
          format: uuid
        senderId:
          type: string
          format: uuid
        senderUsername:
          type: string
          description: Immutable login identifier. May be omitted in future member-facing clients.
        senderDisplayName:
          type: string
        senderAvatarUrl:
          type: string
          nullable: true
        content:
          type: string
        type:
          type: string
          enum: [text, image, video, gif, file]
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        clientMessageId:
          type: string
          description: Client-supplied idempotency key (optional on received messages)
        hidden:
          type: boolean
          description: True when members should render a tombstone placeholder instead of original content

    ModerationAction:
      type: string
      enum: [hide, unhide]

    AdminMessageModeration:
      type: object
      required: [hiddenByModeration, latestAction, latestReason, latestCreatedAt, latestActorUserId]
      properties:
        hiddenByModeration:
          type: boolean
        latestAction:
          allOf:
            - $ref: '#/components/schemas/ModerationAction'
          nullable: true
        latestReason:
          type: string
          nullable: true
        latestCreatedAt:
          type: string
          format: date-time
          nullable: true
        latestActorUserId:
          type: string
          format: uuid
          nullable: true
        latestActorUsername:
          type: string
          nullable: true
        latestActorDisplayName:
          type: string
          nullable: true

    AdminModerateMessageRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500

    SendMessageRequest:
      type: object
      required: [content, type, clientMessageId]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
        type:
          type: string
          enum: [text, image, video, gif, file]
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        clientMessageId:
          type: string
          minLength: 8
          maxLength: 128
          description: Idempotency key supplied by client. Same key = same message (deduped).

    SendMessageResponse:
      type: object
      required: [message, deduped]
      properties:
        message:
          $ref: '#/components/schemas/Message'
        deduped:
          type: boolean
          description: True if clientMessageId matched an existing message (idempotent replay)

    UploadResponse:
      type: object
      required: [id, fileName, originalFileName, url, size, mediaKind]
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        originalFileName:
          type: string
        url:
          type: string
        size:
          type: integer
          description: File size in bytes
        contentType:
          type: string
        mediaKind:
          type: string
          enum: [image, video, file]

    GifResult:
      type: object
      required: [id, url, previewUrl, renderMode, provider]
      properties:
        id:
          type: string
        url:
          type: string
        previewUrl:
          type: string
        renderMode:
          type: string
          enum: [image, video]
        title:
          type: string
          nullable: true
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        provider:
          type: string
          enum: [giphy, klipy]

    GifSearchResponse:
      type: object
      required: [provider, results]
      properties:
        provider:
          type: string
          enum: [giphy, klipy]
        results:
          type: array
          items:
            $ref: '#/components/schemas/GifResult'

    MemberSummary:
      type: object
      required: [id, username, displayName, avatarUrl]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true

    MemberDetail:
      allOf:
        - $ref: '#/components/schemas/MemberSummary'
        - type: object
          required: [bio]
          properties:
            bio:
              type: string
              nullable: true

    AdminMemberSummary:
      allOf:
        - $ref: '#/components/schemas/MemberDetail'
        - type: object
          required: [role, status, mustChangePassword, createdAt]
          properties:
            role:
              $ref: '#/components/schemas/UserRole'
            status:
              $ref: '#/components/schemas/UserStatus'
            mustChangePassword:
              type: boolean
            createdAt:
              type: string
              format: date-time

    AdminInviteResponse:
      type: object
      required: [code, uses, maxUses, createdAt]
      properties:
        code:
          type: string
        uses:
          type: integer
          minimum: 0
        maxUses:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time

    DiagnosticsAvailability:
      type: string
      enum: [available, unavailable, unconfigured]

    AdminRouteErrorSummary:
      type: object
      required: [group, count]
      properties:
        group:
          type: string
        count:
          type: integer
          minimum: 0

    AdminOperatorSummary:
      type: object
      required: [app, members, content, realtime, moderation, invite, push, uploads, errors, backup]
      properties:
        app:
          type: object
          required: [name, checkedAt, databaseReachable, startedAt, uptimeSeconds, version, buildId, deployedAt]
          properties:
            name:
              type: string
            checkedAt:
              type: string
              format: date-time
            databaseReachable:
              type: boolean
            startedAt:
              type: string
              format: date-time
              nullable: true
            uptimeSeconds:
              type: integer
              minimum: 0
              nullable: true
            version:
              type: string
              nullable: true
            buildId:
              type: string
              nullable: true
            deployedAt:
              type: string
              format: date-time
              nullable: true
        members:
          type: object
          required: [total, active, banned, removed, admins]
          properties:
            total:
              type: integer
              minimum: 0
            active:
              type: integer
              minimum: 0
            banned:
              type: integer
              minimum: 0
            removed:
              type: integer
              minimum: 0
            admins:
              type: integer
              minimum: 0
        content:
          type: object
          required: [chats, messages, uploads, uploadBytesTotal]
          properties:
            chats:
              type: integer
              minimum: 0
            messages:
              type: integer
              minimum: 0
            uploads:
              type: integer
              minimum: 0
            uploadBytesTotal:
              type: integer
              minimum: 0
        realtime:
          type: object
          required: [sockets, connectedUsers, activeChatRooms]
          properties:
            sockets:
              type: integer
              minimum: 0
            connectedUsers:
              type: integer
              minimum: 0
            activeChatRooms:
              type: integer
              minimum: 0
        moderation:
          type: object
          required: [hiddenMessages, recentActions24h]
          properties:
            hiddenMessages:
              type: integer
              minimum: 0
            recentActions24h:
              type: integer
              minimum: 0
        invite:
          $ref: '#/components/schemas/AdminInviteResponse'
        push:
          type: object
          required: [configured, androidTokens, iosTokens, notificationsDisabled, quietHoursEnabled, previewsDisabled, sinceStart]
          properties:
            configured:
              type: boolean
            androidTokens:
              type: integer
              minimum: 0
            iosTokens:
              type: integer
              minimum: 0
            notificationsDisabled:
              type: integer
              minimum: 0
            quietHoursEnabled:
              type: integer
              minimum: 0
            previewsDisabled:
              type: integer
              minimum: 0
            sinceStart:
              type: object
              required: [successfulSends, failedSends, staleTokensRemoved, lastFailureAt]
              properties:
                successfulSends:
                  type: integer
                  minimum: 0
                failedSends:
                  type: integer
                  minimum: 0
                staleTokensRemoved:
                  type: integer
                  minimum: 0
                lastFailureAt:
                  type: string
                  format: date-time
                  nullable: true
        uploads:
          type: object
          required: [status, directoryBytes, fileCount, latestUploadAt, scanLimited]
          properties:
            status:
              $ref: '#/components/schemas/DiagnosticsAvailability'
            directoryBytes:
              type: integer
              minimum: 0
              nullable: true
            fileCount:
              type: integer
              minimum: 0
              nullable: true
            latestUploadAt:
              type: string
              format: date-time
              nullable: true
            scanLimited:
              type: boolean
        errors:
          type: object
          required: [sinceStart]
          properties:
            sinceStart:
              type: object
              required: [serverErrorCount, lastServerErrorAt, routeGroups]
              properties:
                serverErrorCount:
                  type: integer
                  minimum: 0
                lastServerErrorAt:
                  type: string
                  format: date-time
                  nullable: true
                routeGroups:
                  type: array
                  items:
                    $ref: '#/components/schemas/AdminRouteErrorSummary'
        backup:
          type: object
          required: [status, target, lastSuccessfulBackupAt]
          properties:
            status:
              type: string
            target:
              type: string
              nullable: true
            lastSuccessfulBackupAt:
              type: string
              format: date-time
              nullable: true

    AdminTempPasswordResponse:
      type: object
      required: [userId, username, temporaryPassword]
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        temporaryPassword:
          type: string

    AdminMessage:
      allOf:
        - $ref: '#/components/schemas/Message'
        - type: object
          required: [senderStatus, moderation]
          properties:
            senderStatus:
              $ref: '#/components/schemas/UserStatus'
            moderation:
              $ref: '#/components/schemas/AdminMessageModeration'

paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, app, ts]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  app:
                    type: string
                  ts:
                    type: string
                    format: date-time

  /api/v1/auth/register:
    post:
      summary: Register with invite code
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered and authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error or invalid/expired invite code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidInvite:
                  value:
                    error: 'Invalid or expired invite code'
                validationError:
                  value:
                    error:
                      fieldErrors:
                        username: ['String must contain at least 3 character(s)']
                      formErrors: []
        '409':
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Username already exists'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      summary: Login
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Invalid credentials'

  /api/v1/auth/refresh:
    post:
      summary: Rotate refresh token and issue new access token
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair issued, old refresh token invalidated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Invalid or expired refresh token'

  /api/v1/auth/password-reset:
    post:
      summary: Reset password using username and recovery code
      operationId: authPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Password reset complete and authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid username or recovery code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Invalid recovery code or username'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      summary: Logout current refresh token
      operationId: authLogout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Logged out (refresh token deleted)
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/me:
    get:
      summary: Get current member profile
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current member profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Unauthorized or invalid user session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/me/sessions:
    get:
      summary: List active sessions for the current member
      operationId: listMySessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active refresh-token-backed sessions for this member
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionSummary'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/me/sessions/others:
    delete:
      summary: Revoke all other active sessions for the current member
      operationId: revokeOtherSessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Other sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeOtherSessionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Current session could not be identified cleanly
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/me/sessions/{sessionId}:
    delete:
      summary: Revoke one other active session for the current member
      operationId: revokeSession
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Session revoked
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found for this member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Current session must be ended through the normal logout path
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/me/profile:
    patch:
      summary: Update current member profile
      operationId: updateMeProfile
      security:
        - bearerAuth: []
      requestBody:

openapi: 3.1.0
info:
  title: The Penthouse API
  version: 1.0.0-alpha
  description: Private social platform API. All protected endpoints require a Bearer access token.
servers:
  - url: http://localhost:3000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          oneOf:
            - type: string
              description: Human-readable error message
            - type: object
              description: Zod field-level validation error (fieldErrors + formErrors)

    RegisterRequest:
      type: object
      required: [username, password, inviteCode]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        password:
          type: string
          minLength: 10
          maxLength: 128
        inviteCode:
          type: string
          minLength: 6
          maxLength: 64

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        password:
          type: string
          minLength: 10
          maxLength: 128

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 20
          description: Opaque refresh token (96-char hex from server)

    AuthResponse:
      type: object
      required: [user, accessToken, refreshToken]
      properties:
        user:
          type: object
          required: [id, username]
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
        accessToken:
          type: string
          description: Short-lived JWT (default 15m)
        refreshToken:
          type: string
          description: Long-lived opaque token for rotation (default 7d)

    ChatSummary:
      type: object
      required: [id, type, name, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [dm, channel]
        name:
          type: string
        updatedAt:
          type: string
          format: date-time

    Message:
      type: object
      required: [id, chatId, senderId, content, createdAt]
      properties:
        id:
          type: string
          format: uuid
        chatId:
          type: string
          format: uuid
        senderId:
          type: string
          format: uuid
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        clientMessageId:
          type: string
          description: Client-supplied idempotency key (optional on received messages)

    SendMessageRequest:
      type: object
      required: [content, clientMessageId]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
        clientMessageId:
          type: string
          minLength: 8
          maxLength: 128
          description: Idempotency key supplied by client. Same key = same message (deduped).

    SendMessageResponse:
      type: object
      required: [message, deduped]
      properties:
        message:
          $ref: '#/components/schemas/Message'
        deduped:
          type: boolean
          description: True if clientMessageId matched an existing message (idempotent replay)

    UploadResponse:
      type: object
      required: [id, fileName, url, size]
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        url:
          type: string
        size:
          type: integer
          description: File size in bytes

paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, app, ts]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  app:
                    type: string
                  ts:
                    type: string
                    format: date-time

  /api/v1/auth/register:
    post:
      summary: Register with invite code
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered and authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error or invalid/expired invite code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidInvite:
                  value:
                    error: 'Invalid or expired invite code'
                validationError:
                  value:
                    error:
                      fieldErrors:
                        username: ['String must contain at least 3 character(s)']
                      formErrors: []
        '409':
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Username already exists'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      summary: Login
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Invalid credentials'

  /api/v1/auth/refresh:
    post:
      summary: Rotate refresh token and issue new access token
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair issued, old refresh token invalidated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Invalid or expired refresh token'

  /api/v1/auth/logout:
    post:
      summary: Logout current refresh token
      operationId: authLogout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Logged out (refresh token deleted)
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/chats:
    get:
      summary: List chats available to current user
      operationId: listChats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of chat summaries ordered by last activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatSummary'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Unauthorized'

  /api/v1/chats/{chatId}/messages:
    get:
      summary: List messages for chat (cursor-paginated, newest first)
      operationId: listMessages
      security:
        - bearerAuth: []
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          required: false
          description: Message ID to paginate before (exclusive)
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          description: Number of messages to return (1–100, default 30)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
      responses:
        '200':
          description: Array of messages in descending chronological order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not a member of this chat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Forbidden'

    post:
      summary: Send message with idempotent clientMessageId
      operationId: sendMessage
      security:
        - bearerAuth: []
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Message sent or deduped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not a member of this chat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Forbidden'

  /api/v1/media/upload:
    post:
      summary: Upload media (multipart/form-data)
      operationId: uploadMedia
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (max configurable via UPLOAD_MAX_MB env)
      responses:
        '201':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: No file provided or file too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
